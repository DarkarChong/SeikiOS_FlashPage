  <script>
    // ── Ruffle player ──
    window.RufflePlayer = window.RufflePlayer || {};
    window.RufflePlayer.config = {
      warnOnUnsupportedContent: true,
    };
    window.addEventListener('load', () => {
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();
      const container = document.getElementById('ruffle-player');
      container.appendChild(player);
      player.style.width  = '100%';
      player.style.height = '100%';
      player.load('game.swf');
    });

    // ── Rating (per-user, stored in localStorage) ──
    (function initRating(){
      const gameId = 'bart-saw-game-1';
      const key = 'seikios:rating:' + gameId;
      const stars = document.querySelectorAll('#rating-stars .star');
      const info  = document.getElementById('rating-your');

      function paint(value, asHover) {
        stars.forEach(s => {
          const v = parseInt(s.dataset.value, 10);
          s.classList.toggle('active', v <= value);
          s.classList.toggle('hovering', asHover && v <= value);
        });
      }
      function setLabel(value) {
        if (value > 0) info.textContent = 'Your rating: ' + value + ' / 5';
        else info.textContent = 'Click a star to rate';
      }

      let current = parseInt(localStorage.getItem(key) || '0', 10);
      paint(current, false);
      setLabel(current);

      stars.forEach(s => {
        s.addEventListener('mouseenter', () => paint(parseInt(s.dataset.value, 10), true));
        s.addEventListener('mouseleave', () => paint(current, false));
        s.addEventListener('click', () => {
          current = parseInt(s.dataset.value, 10);
          localStorage.setItem(key, String(current));
          paint(current, false);
          setLabel(current);
        });
      });
    })();

  </script>
