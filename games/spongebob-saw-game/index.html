<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spongebob Saw Game — SEIKIOS</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  <style>
    .game-layout { max-width: 900px; margin: 0 auto; padding: 2rem; }

    .breadcrumb {
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .breadcrumb a { color: var(--accent); }
    .breadcrumb a:hover { color: var(--gold); }

    .game-title {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 900;
      margin-bottom: .5rem;
    }

    .game-meta {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .player-wrap {
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 2rem;
      aspect-ratio: 4/3;
      max-height: 540px;
    }

    #ruffle-player {
      width: 100%;
      height: 100%;
    }

    .patch-section { margin-top: 2rem; }

    .patch-section h2 {
      font-size: 1rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .bug-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }

    .bug-item {
      background: var(--surface);
      border: 1px solid #2a0606;
      border-radius: var(--radius);
      padding: .65rem 1rem;
      font-size: .875rem;
      display: flex;
      gap: .75rem;
      align-items: flex-start;
    }

    .bug-n {
      color: var(--gold);
      font-weight: 700;
      min-width: 2rem;
      font-size: .75rem;
      padding-top: .1rem;
    }

    .bug-desc { color: var(--text); line-height: 1.5; }
    .bug-file { color: var(--muted); font-size: .75rem; font-family: monospace; }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-icon">S</div>
      SEIKIOS
    </div>
    <nav>
      <a href="../../#catalog">Games</a>
      <a href="../../#about">About</a>
      <a href="https://github.com/DarkarChong/SeikiOS_FlashPage" target="_blank">GitHub</a>
    </nav>
  </header>

  <main class="game-layout">

    <div class="breadcrumb">
      <a href="../../">SEIKIOS</a> › Spongebob Saw Game
    </div>

    <h1 class="game-title">Spongebob Saw Game</h1>

    <div class="game-meta">
      <span class="badge badge-patched">✓ Patched</span>
      <span class="badge badge-bugs">42 bugs fixed</span>
      <span class="badge" style="background:#1a1010; color:var(--muted);">2009 · Point & Click</span>
    </div>

    <!-- RUFFLE PLAYER -->
    <div class="player-wrap">
      <div id="ruffle-player"></div>
    </div>

    <!-- PATCH LOG -->
    <div class="patch-section">
      <h2>Patch log — 35 bugs fixed</h2>
      <ul class="bug-list" id="bug-list">
        <!-- filled by inline script below -->
      </ul>
    </div>

  </main>

  <footer>
    <p>SEIKIOS — Flash Game Preservation Project</p>
    <p>Non-profit · All rights belong to original creators · Powered by <a href="https://ruffle.rs" target="_blank">Ruffle</a></p>
  </footer>

  <script>
    // ── Ruffle player ──
    window.RufflePlayer = window.RufflePlayer || {};
    window.RufflePlayer.config = {
      logLevel: "verbose",
      warnOnUnsupportedContent: true,
    };
    window.addEventListener('load', () => {
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();
      const container = document.getElementById('ruffle-player');
      container.appendChild(player);
      player.style.width  = '100%';
      player.style.height = '100%';
      player.load('game.swf');
    });

    // ── Bug list — 42 broken state machine transitions patched ──
    const bugs = [
      // DoAction_53 — Pig Face Room
      { n:1,  desc:'Pig Face room: message node "MSJ1" had placeholder text "XXXXXXXXXXXX" instead of actual dialogue string — game froze on trigger.', file:'frame_7/DoAction_53.as:11' },
      // DoAction_61 — Bob\'s Bedroom
      { n:2,  desc:'Bob\'s Bedroom: condition HAVE@TERMINAR_DIALOGO pointed to broken state "XXX" — dialogue end transition never resolved.', file:'frame_7/DoAction_61.as:47' },
      { n:3,  desc:'Bob\'s Bedroom: condition HAVE@COFRE_ABIERTO_BOB pointed to broken state "XXXX" — chest-open state never triggered downstream logic.', file:'frame_7/DoAction_61.as:567' },
      // DoAction_64 — Bob\'s Bathroom
      { n:4,  desc:'Bob\'s Bathroom: default fallback transition (@|%48) pointed to broken state "XXX" — room state machine stuck on unresolved branch.', file:'frame_7/DoAction_64.as:171' },
      // DoAction_65 — Living Room
      { n:5,  desc:'Living Room: condition HAVE@GANCHO_VISIBLE (first check) pointed to broken state "XXX" — hook visibility flag never resolved.', file:'frame_7/DoAction_65.as:112' },
      { n:6,  desc:'Living Room: condition HAVE@GANCHO_VISIBLE (second check) pointed to broken state "XXX" — duplicate broken branch for hook visibility.', file:'frame_7/DoAction_65.as:124' },
      { n:7,  desc:'Living Room: default fallback transition (@|%48) pointed to broken state "XXXX" — room progression permanently blocked.', file:'frame_7/DoAction_65.as:162' },
      // DoAction_68 — Patrick\'s House Facade
      { n:8,  desc:'Patrick\'s Facade: condition HAVE@ENTRO_CASA_PATRICIO pointed to broken state "XXX" — entering Patrick\'s house never triggered correct state.', file:'frame_7/DoAction_68.as:71' },
      // DoAction_70 — Squidward\'s Facade
      { n:9,  desc:'Squidward\'s Facade: condition HAVE@USO_LLAVE pointed to broken state "XXXX" — wrench-used flag had no valid next state.', file:'frame_7/DoAction_70.as:51' },
      { n:10, desc:'Squidward\'s Facade: condition IN_SCENE@CUARTO_BICICLETA pointed to broken state "XXX" — bicycle scene check unresolved.', file:'frame_7/DoAction_70.as:54' },
      { n:11, desc:'Squidward\'s Facade: condition HAVE@PUSO_LLAVE pointed to broken state "XXXX" — wrench-placed flag had no valid next state.', file:'frame_7/DoAction_70.as:57' },
      { n:12, desc:'Squidward\'s Facade: condition IN_SCENE@CUARTO_BICICLETA (second check) pointed to broken state "XXXX" — duplicate broken scene check.', file:'frame_7/DoAction_70.as:67' },
      { n:13, desc:'Squidward\'s Facade: default fallback transition (@|%48) pointed to broken state "XXXXX" — entire fallback path broken.', file:'frame_7/DoAction_70.as:71' },
      { n:14, desc:'Squidward\'s Facade: condition HAVE@ABRIO_PUERTA pointed to broken state "XXXXX" — door-opened flag never advanced game state.', file:'frame_7/DoAction_70.as:83' },
      // DoAction_72 — Squidward\'s Storage Room
      { n:15, desc:'Squidward\'s Storage: condition HAVE@USO_LLAVE pointed to broken state "XXXX" — wrench interaction in storage room broken.', file:'frame_7/DoAction_72.as:114' },
      { n:16, desc:'Squidward\'s Storage: condition HAVE@PUSO_LLAVE pointed to broken state "XXXX" — wrench-placed state in storage room broken.', file:'frame_7/DoAction_72.as:121' },
      { n:17, desc:'Squidward\'s Storage: default fallback transition (@|%48) for propeller sequence pointed to broken state "XXXXX".', file:'frame_7/DoAction_72.as:143' },
      // DoAction_74 — Bicycle Room
      { n:18, desc:'Bicycle Room: condition HAVE@USO_LLAVE pointed to broken state "XXXX" — using the wrench on bicycle had no valid next state.', file:'frame_7/DoAction_74.as:114' },
      // DoAction_76 — Mr. Krabs\' Office
      { n:19, desc:'Mr. Krabs\' Office: default fallback transition (@|%48) pointed to broken state "XXX" — room progression blocked.', file:'frame_7/DoAction_76.as:247' },
      // DoAction_79 — Fan Room
      { n:20, desc:'Fan Room: condition HAVE@TIENE_HELICE pointed to broken state "XXX" — having the propeller never unlocked the fan puzzle.', file:'frame_7/DoAction_79.as:77' },
      // DoAction_85 — Vicky Room
      { n:21, desc:'Vicky Room: condition HAVE@LLEGO_LUZ pointed to broken state "XXXX" — light-arrived flag never advanced Vicky\'s room logic.', file:'frame_7/DoAction_85.as:49' },
      { n:22, desc:'Vicky Room: condition HAVE@CARGO_BATERIA pointed to broken state "XXXX" — battery-charged flag had no valid next state.', file:'frame_7/DoAction_85.as:119' },
      // DoAction_95 — Pulley Room
      { n:23, desc:'Pulley Room: condition HAVE@ESTA_ANIMANDO_ENGRANAJES (check 1) pointed to broken state "XXX" — gear animation flag broken.', file:'frame_7/DoAction_95.as:55' },
      { n:24, desc:'Pulley Room: condition HAVE@ESTA_ANIMANDO_ENGRANAJES (check 2) pointed to broken state "XXX" — second gear animation check also broken.', file:'frame_7/DoAction_95.as:115' },
      { n:25, desc:'Pulley Room: condition HAVE@GANA_ENGRANAJE_GRANDE_INV (check 1) pointed to broken state "XXX" — large gear pickup never registered.', file:'frame_7/DoAction_95.as:156' },
      { n:26, desc:'Pulley Room: condition HAVE@ESTA_ANIMANDO_ENGRANAJES (check 3) pointed to broken state "XXX" — third broken gear animation branch.', file:'frame_7/DoAction_95.as:182' },
      { n:27, desc:'Pulley Room: condition HAVE@GANA_ENGRANAJE_GRANDE_INV (check 2) pointed to broken state "XXX" — duplicate broken large gear pickup check.', file:'frame_7/DoAction_95.as:202' },
      // DoAction_104 — Diamond Room
      { n:28, desc:'Diamond Room: condition HAVE@GANO_GEMAS_DIAMANTE pointed to broken state "XXXX" — collecting all diamond gems had no valid next state.', file:'frame_7/DoAction_104.as:68' },
      // DoAction_105 — Gem Box Room (9 bugs)
      { n:29, desc:'Gem Box Room: fallback transition (@|%48) on gem slot 1 pointed to broken state "XXX" — slot 1 unresolved branch.', file:'frame_7/DoAction_105.as:62' },
      { n:30, desc:'Gem Box Room: fallback transition (@|%48) on gem slot 2 pointed to broken state "XXXX" — slot 2 unresolved branch.', file:'frame_7/DoAction_105.as:65' },
      { n:31, desc:'Gem Box Room: fallback transition (@|%48) on gem slot 3 pointed to broken state "XXXX" — slot 3 unresolved branch.', file:'frame_7/DoAction_105.as:68' },
      { n:32, desc:'Gem Box Room: fallback transition (@|%48) on gem slot 4 pointed to broken state "XXXX" — slot 4 unresolved branch.', file:'frame_7/DoAction_105.as:71' },
      { n:33, desc:'Gem Box Room: fallback transition (@|%48) on gem slot 5 pointed to broken state "XXXX" — slot 5 unresolved branch.', file:'frame_7/DoAction_105.as:74' },
      { n:34, desc:'Gem Box Room: fallback transition (@|%48) on gem slot 6 pointed to broken state "XXX" — slot 6 unresolved branch.', file:'frame_7/DoAction_105.as:88' },
      { n:35, desc:'Gem Box Room: fallback transition (@|%48) on gem slot 7 pointed to broken state "XXX" — slot 7 unresolved branch.', file:'frame_7/DoAction_105.as:104' },
      { n:36, desc:'Gem Box Room: fallback transition (@|%48) on gem slot 8 pointed to broken state "XXX" — slot 8 unresolved branch.', file:'frame_7/DoAction_105.as:120' },
      { n:37, desc:'Gem Box Room: fallback transition (@|%48) on gem slot 9 pointed to broken state "XXX" — slot 9 unresolved branch.', file:'frame_7/DoAction_105.as:136' },
      // DoAction_108 — Dark Room 2 (block puzzle)
      { n:38, desc:'Dark Room 2: condition HAVE@BLOQUE_1_PRESIONADO pointed to broken state "XXX" — block 1 press never advanced the block puzzle.', file:'frame_7/DoAction_108.as:59' },
      { n:39, desc:'Dark Room 2: condition HAVE@BLOQUE_2_PRESIONADO pointed to broken state "XXX" — block 2 press never advanced the block puzzle.', file:'frame_7/DoAction_108.as:76' },
      { n:40, desc:'Dark Room 2: condition HAVE@BLOQUE_3_PRESIONADO pointed to broken state "XXX" — block 3 press never advanced the block puzzle.', file:'frame_7/DoAction_108.as:93' },
      { n:41, desc:'Dark Room 2: condition HAVE@BLOQUE_4_PRESIONADO pointed to broken state "XXX" — block 4 press never advanced the block puzzle.', file:'frame_7/DoAction_108.as:110' },
      // DoAction_109 — Thug 1 Room
      { n:42, desc:'Thug 1 Room: default fallback transition (@|%48) pointed to broken state "XXXX" — room state machine permanently stuck.', file:'frame_7/DoAction_109.as:152' },
    ];

    const list = document.getElementById('bug-list');
    list.innerHTML = bugs.map(b => `
      <li class="bug-item">
        <span class="bug-n">#${String(b.n).padStart(2,'0')}</span>
        <div>
          <div class="bug-desc">${b.desc}</div>
          ${b.file ? `<div class="bug-file">${b.file}</div>` : ''}
        </div>
      </li>
    `).join('');
  </script>

</body>
</html>
